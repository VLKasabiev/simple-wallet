version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: simple_wallet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simple_wallet
    ports:
      - "5432:5432"
    volumes:
      - simple_wallet_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  simple_wallet_data: