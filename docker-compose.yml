version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: simple_wallet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simple_wallet
    ports:
      - "5432:5432"
    volumes:
      - simple_wallet_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_wallet"]
      interval: 3s
      timeout: 3s
      retries: 5
  

  wallet_api:
    build: .
    container_name: simple_wallet_app
    ports:
      - "8080:8080"
    environment:
      SERVER_PG_HOST: postgres_db 
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  simple_wallet_data: